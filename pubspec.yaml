name: medical_lab_flutter
description: نظام مختبر الشفاء الطبية - تطبيق متكامل للفحوصات الطبية
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # الإدارة الحالة
  provider: ^6.1.1
  riverpod: ^2.4.9
  
  # الشبكة والـ API
  http: ^1.1.2
  dio: ^5.4.0
  # المصادقة والتخزين
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1
  flutter_launcher_icons: "^0.13.1"
  # التوجيه
  go_router: ^17.0.1
  auto_route: ^11.1.0
  network_info_plus: ^7.0.0  # ✅ أضف هذه المكتبة
  # التصميم والـ UI
  flutter_screenutil: ^5.9.0
  gap: ^3.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  syncfusion_flutter_charts: ^32.1.25
  syncfusion_flutter_datepicker: ^32.1.25
  intl: ^0.20.0
  flutter_localizations:
    sdk: flutter

  # النماذج
  flutter_form_builder: ^10.2.0
  image_picker: ^1.0.7
  file_picker: ^10.3.10
  open_file: ^3.3.2

  # الإشعارات و Firebase (تم التحديث والإضافة)
  firebase_core: ^4.4.0      # ✅ أساسي ومهم جداً
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.6
  flutter_native_splash: ^2.3.9
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1  # 👈 قم بتغيير هذا الرقم
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.6.0
  
  # الدفع
  in_app_purchase: ^3.0.0
  flutter_stripe: ^12.2.0

  # الخرائط
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  google_generative_ai: ^0.4.0

  # الدردشة والدعم
  socket_io_client: ^3.1.4
  url_launcher: ^6.2.4
  geocoding: ^4.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  auto_route_generator: ^10.4.0
  flutter_lints: ^6.0.0

# ✅ الحل السحري: إجبار جميع المكتبات على استخدام النسخة الحديثة
dependency_overrides:
  intl: ^0.20.0

flutter:
  uses-material-design: true
  
  # الأصول (Assets)
  assets:
    - assets/
    # - assets/icons/  <-- اترك هذا معلقاً إذا كان المجلد فارغاً كما يظهر في الصورة

  # الخطوط (Fonts)
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png" # ✅ تأكد أن هذا هو مسار شعارك الصحيح
  min_sdk_android: 21